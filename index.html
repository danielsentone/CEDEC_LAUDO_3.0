<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Defesa Civil PR - Laudos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" referrerPolicy="no-referrer" />
    <script>
      // Kill all service workers and clear caches to prevent caching issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('[SYSTEM] Service Worker unregistered');
          }
        });
      }
      
      // Clear all caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('[SYSTEM] Cache deleted:', name);
          }
        });
      }

      // Global function to hide loader
      window.hideLoader = function() {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => loader.remove(), 500);
        }
      };

      // Fallback: Hide loader if it's still there after 15 seconds
      // This allows the user to see the #root content (which might have error messages)
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader && loader.parentElement) {
          console.warn('[SYSTEM] Loading timeout reached. Hiding loader.');
          const sub = document.getElementById('loading-subtext');
          if (sub) sub.innerText = 'A inicialização está demorando. Tentando exibir interface...';
          
          // Check if #root has content
          const root = document.getElementById('root');
          if (root && root.innerHTML.length > 0) {
            console.log('[SYSTEM] #root has content, hiding loader.');
            window.hideLoader();
          } else {
            console.log('[SYSTEM] #root is empty, showing force reload button.');
            const btn = document.getElementById('force-reload');
            if (btn) btn.style.display = 'block';
          }
        }
      }, 15000);
    </script>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: white;
        z-index: 9999;
        font-family: sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.1);
        border-left-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
  <body class="bg-gray-50 text-slate-800 antialiased">
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Iniciando Sistema...</p>
      <p id="loading-subtext" style="font-size: 12px; opacity: 0.6; margin-top: 10px;">Carregando módulos...</p>
      <button id="force-reload" style="display: none; margin-top: 20px; padding: 8px 16px; background: #f97316; border: none; border-radius: 4px; color: white; cursor: pointer;">Recarregar Página</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Force reload button handler
      document.getElementById('force-reload').onclick = () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      };
    </script>
  </body>
</html>
