<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DC PR Laudos" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/cLBwfwdK/LOGO_DC.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Defesa Civil PR - Laudos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" referrerPolicy="no-referrer" />
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('[SYSTEM] Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('[SYSTEM] Service Worker registration failed:', error);
            });
        });
      }
      
      // Global function to hide loader
      window.hideLoader = function() {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => loader.remove(), 500);
        }
      };

      // Fallback: Hide loader if it's still there after 15 seconds
      // This allows the user to see the #root content (which might have error messages)
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader && loader.parentElement) {
          console.warn('[SYSTEM] Loading timeout reached. Hiding loader.');
          const sub = document.getElementById('loading-subtext');
          if (sub) sub.innerText = 'A inicialização está demorando. Tentando exibir interface...';
          
          // Check if #root has content
          const root = document.getElementById('root');
          if (root && root.innerHTML.length > 0) {
            console.log('[SYSTEM] #root has content, hiding loader.');
            window.hideLoader();
          } else {
            console.log('[SYSTEM] #root is empty, showing force reload button.');
            const btn = document.getElementById('force-reload');
            if (btn) btn.style.display = 'block';
          }
        }
      }, 15000);
    </script>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: white;
        z-index: 9999;
        font-family: sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.1);
        border-left-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
  <body class="bg-gray-50 text-slate-800 antialiased">
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Iniciando Sistema...</p>
      <p id="loading-subtext" style="font-size: 12px; opacity: 0.6; margin-top: 10px;">Carregando módulos...</p>
      <button id="force-reload" style="display: none; margin-top: 20px; padding: 8px 16px; background: #f97316; border: none; border-radius: 4px; color: white; cursor: pointer;">Recarregar Página</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Force reload button handler
      document.getElementById('force-reload').onclick = () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      };
    </script>
  </body>
</html>
